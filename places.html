<!DOCTYPE html>
<html iang="en">
<head>
    <meta charset="UFT-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Places You've Been</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav>
        <h1>Travel Address Book</h1>

        <div class="nav-links">
            <a href="address.html">Address Book</a>
        </div>


    </nav>

    <main class="page-container">

        <section class="card">

            <h2>Add Place</h2>

            <form id="place-form">

                <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" required>
            </div>

            <div class="form-group">
                <label for="season">Time of Year</label>
                <input type="text" id="season" required>
            </div>

            <div class="form-group">
                <label for="landmark">Landmark</label>
                <input type="text" id="landmark" required>
            </div>

            
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea type="text" id="notes"></textarea>
            </div>

            <button type="submit">Add Place</button>

            </form>

        </section>

        <section class="card">

            <h2>Visited Places</h2>

            <ul id="places-list"></ul>

            <div id="place-details" class="details-box hidden">
                <h3>Place Details</h3>
                <p id="place-info"></p>
            </div>

        </section>

    </main>

    <footer>
        <p>&copy 2026 Travel Address Book</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
